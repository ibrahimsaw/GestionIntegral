services:
  web:
    build: .
    container_name: gestion_integral_app
    restart: always
    ports:
      - "8087:8000"
    volumes:
      - .:/app
      - django_media:/app/media
      - django_static:/app/app/static
    environment:
      - DEBUG=True
    command: python manage.py runserver 0.0.0.0:8000

volumes:
  django_media:
  django_static: