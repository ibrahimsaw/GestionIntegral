{% extends 'base.html' %}
{% block title %}Rapport Panneaux — Integral{% endblock %}
{% block topbar_title %}<i class="bi bi-file-earmark-bar-graph me-2" style="color:var(--color-primary)"></i>Rapport Panneaux{% endblock %}

{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-12">
                <h2>Rapport Panneaux</h2>
                <form method="get" class="mb-3">
                    <div class="row">
                        <div class="col-md-3">
                            <label for="ville" class="form-label">Ville</label>
                            <input type="text" class="form-control" id="ville" name="ville" value="{{ filters.ville }}">
                        </div>
                        <div class="col-md-3">
                            <label for="quartier" class="form-label">Quartier</label>
                            <input type="text" class="form-control" id="quartier" name="quartier" value="{{ filters.quartier }}">
                        </div>
                        <div class="col-md-3">
                            <label for="statut" class="form-label">Statut</label>
                            <select class="form-control" id="statut" name="statut">
                                <option value="">Tous les statuts</option>
                                <option value="en_cours" {% if filters.statut == "en_cours" %}selected{% endif %}>En cours</option>
                                <option value="termine" {% if filters.statut == "termine" %}selected{% endif %}>Terminé</option>
                            </select>
                        </div>
                        <div class="col-md-3">
                            <label class="form-label">&nbsp;</label>
                            <button type "submit" class("btn btn-primary")>Filtrer</button>
                        </div>
                    </div>
                </form>

                <table class("table table-striped"):
                    <thead>
                        <tr>
                            <th>Code</th>
                            <th>Nom</th>
                            <th>Ville</th>
                            <th>Quartier</th>
                            <th>Adresse</th>
                            <th>Statut</th>
                            <th>Faces occupées</th>
                            <th>Faces libres</th>
                            <th>Campagnes associées</th>
                        </tr>
                    </thead>
                    <tbody>

                    </tbody>
                </table>

            </div>

        </div>

    </div>

{% endblock %}
