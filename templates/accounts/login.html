{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Connexion — Integral</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<style>
:root {
      --color-disponible:  {{ DESIGN.COLOR_DISPONIBLE }};
      --color-occupe:      {{ DESIGN.COLOR_OCCUPE }};
      --color-maintenance: {{ DESIGN.COLOR_MAINTENANCE }};
      --color-primary:     {{ DESIGN.COLOR_PRIMARY }};
      --color-secondary:   {{ DESIGN.COLOR_SECONDARY }};
      --bg:       #f1f5f9;
      --bg-card:  #ffffff;
      --bg-card2: #f8fafc;
      --border:   #e2e8f0;
      --text:     #1e293b;
      --text-muted: #64748b;
      --sidebar-w: 260px;
      --topbar-h:  58px;
      --radius:    8px;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
      --shadow-md: 0 4px 12px rgba(0,0,0,.1);
    }
body {
  background: #f1f5f9;
  font-family: system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
}
.login-card {
  background: #fff;
  border: 1px solid #e2e8f0;
  border-radius: 12px;
  padding: 40px 36px;
  width: 100%;
  max-width: 420px;
  box-shadow: 0 4px 24px rgba(0,0,0,.08);
}
.brand-logo {
  width: 52px; height: 52px;
  background: var(--color-primary);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 16px;
}
.form-control {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  border-radius: 7px;
  padding: 11px 13px;
  font-size: .875rem;
}
.form-control:focus {
  background: #fff;
  border-color: #2563eb;
  box-shadow: 0 0 0 3px rgba(37,99,235,.12);
}
.form-label {
  font-size: .72rem;
  font-weight: 700;
  color: #64748b;
  text-transform: uppercase;
  letter-spacing: .4px;
  margin-bottom: 5px;
}
.btn-login {
  background: var(--color-primary);
  border: none;
  color: #fff;
  font-weight: 700;
  font-size: .95rem;
  padding: 12px;
  border-radius: 7px;
  width: 100%;
  transition: background .15s;
}
.btn-eye {
  background: var(--color-primary);
  color: #fff;
  transition: background .15s;
}
.btn-login:hover { background:  var(--color-primary); }
.alert-danger {
  background: #fef2f2;
  color: #b91c1c;
  border: 1px solid #fecaca;
  border-radius: 7px;
  font-size: .875rem;
}
.input-group-text {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #94a3b8;
}
</style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <img style="height: 60px;" src="{% static 'img/logo.png' %}" alt="Logo">
  </div>

  {% if messages %}
  {% for msg in messages %}
  <div class="alert alert-danger mb-3 d-flex align-items-center gap-2">
    <i class="bi bi-exclamation-circle-fill"></i>{{ msg }}
  </div>
  {% endfor %}
  {% endif %}

  <form method="post">
    {% csrf_token %}
    <div class="mb-3">
      <label class="form-label">Identifiant</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-person"></i></span>
        <input type="text" name="username" class="form-control" placeholder="admin" autofocus required>
      </div>
    </div>
    <div class="mb-4">
      <label class="form-label">Mot de passe</label>
      <div class="input-group">
        <span class="input-group-text"><i class="bi bi-lock"></i></span>
        <input id="password-input" type="password" name="password" class="form-control" placeholder="••••••••" required>
        <button class="btn btn-outline-secondary btn-eye" type="button" onclick="togglePassword()" aria-label="Voir le mot de passe">
          <i id="password-icon" style="color: var(--color-secondary);" class="bi bi-eye"></i>
        </button>
      </div>
    </div>
    <button type="submit" class="btn-login">
      <i class="bi bi-box-arrow-in-right me-2"></i>Se connecter
    </button>
  </form>

  {% comment %} <hr class="my-4" style="border-color:#e2e8f0">
  <div class="row text-center g-2" style="font-size:.72rem;color:#94a3b8">
    <div class="col-6"><strong>admin</strong> / admin123</div>
    <div class="col-6"><strong>staff</strong> / staff123</div>
    <div class="col-6"><strong>technicien</strong> / tech123</div>
    <div class="col-6"><strong>client1</strong> / client123</div>
  </div> {% endcomment %}
</div>
<script>
  function togglePassword() {
    const passwordInput = document.getElementById('password-input');
    const icon = document.getElementById('password-icon');
    if (passwordInput.type === 'password') {
      passwordInput.type = 'text';
      icon.classList.remove('bi-eye');
      icon.classList.add('bi-eye-slash');
    } else {
      passwordInput.type = 'password';
      icon.classList.remove('bi-eye-slash');
      icon.classList.add('bi-eye');
    }
  }
</script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
